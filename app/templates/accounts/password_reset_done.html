{% extends 'base.html' %}

{% block title %}Reset Link Sent - Fixora CMS{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 text-center">
                <div class="card-body p-5">
                    <div style="width: 80px; height: 80px; background: #d1fae5; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--success); margin-bottom: 1.5rem;">
                        <i class="fas fa-envelope-open-text"></i>
                    </div>
                    <h4 class="fw-bold mb-2">Check Your Email</h4>
                    <p class="text-muted mb-3">We've sent password reset instructions to your email.</p>
                    <p class="small text-muted mb-4">If you don't receive an email, check your spam folder or verify the email you entered.</p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
