{% extends 'base.html' %}

{% block title %}Password Reset Complete - Fixora CMS{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 text-center">
                <div class="card-body p-5">
                    <div style="width: 80px; height: 80px; background: #d1fae5; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--success); margin-bottom: 1.5rem;">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h4 class="fw-bold mb-2">Password Reset Complete</h4>
                    <p class="text-muted mb-4">Your password has been set successfully.</p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg">
                        <i class="fas fa-sign-in-alt"></i> Login Now
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
